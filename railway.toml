# Railway deploy config for the worker service.
# Place at repo root. The worker service in Railway MUST have its
# "Root Directory" set to `worker` — that makes `worker/` the Docker
# build context, so the Dockerfile's COPY commands resolve correctly
# (package-lock.json lives at worker/package-lock.json, not repo root).

[build]
builder = "DOCKERFILE"
# Path is relative to the service's Root Directory.
dockerfilePath = "Dockerfile"

[deploy]
# Healthcheck targets the /readyz endpoint exposed by worker/src/health.ts.
# Railway will mark the deploy unhealthy and roll back if /readyz doesn't
# return 200 within startCommandTimeoutSeconds.
healthcheckPath = "/readyz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# Send SIGTERM and wait this long before SIGKILL. Worker drains in-flight
# jobs up to SHUTDOWN_DRAIN_MS (25s default) so 30s gives a 5s buffer.
gracePeriodSeconds = 30
