<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="OracleBot probe catalogue — 48 probes across 5 packs">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07080B"/>
      <stop offset="1" stop-color="#0F1117"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(124,240,192,0.06)" stroke-width="1"/>
    </pattern>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7CF0C0"/>
      <stop offset="1" stop-color="#a18bff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Brand mark -->
  <g transform="translate(72,72)">
    <rect x="0" y="0" width="44" height="44" rx="6" fill="none" stroke="#7CF0C0" stroke-width="2"/>
    <text x="22" y="30" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="22" font-weight="600" fill="#7CF0C0">O</text>
    <text x="60" y="30" font-family="JetBrains Mono, ui-monospace, monospace" font-size="22" font-weight="600" fill="#ECEEF2">OracleBot</text>
    <text x="60" y="48" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#5F6573">probe catalogue · public</text>
  </g>

  <!-- Headline -->
  <g transform="translate(72,260)">
    <text font-family="JetBrains Mono, ui-monospace, monospace" font-size="76" font-weight="500" fill="#ECEEF2" letter-spacing="-2">
      <tspan x="0" dy="0">48 probes.</tspan>
      <tspan x="0" dy="86">5 packs.</tspan>
      <tspan x="0" dy="86" fill="url(#accent)">No black box.</tspan>
    </text>
  </g>

  <!-- Pack pills bottom-right -->
  <g transform="translate(72,560)" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" fill="#9097A4">
    <rect x="0" y="-22" width="120" height="32" rx="16" fill="rgba(124,240,192,0.08)" stroke="rgba(124,240,192,0.25)"/>
    <text x="60" y="0" text-anchor="middle" fill="#7CF0C0">web · 16</text>

    <rect x="132" y="-22" width="140" height="32" rx="16" fill="rgba(161,139,255,0.08)" stroke="rgba(161,139,255,0.25)"/>
    <text x="202" y="0" text-anchor="middle" fill="#a18bff">ai-built · 12</text>

    <rect x="284" y="-22" width="120" height="32" rx="16" fill="rgba(95,183,255,0.08)" stroke="rgba(95,183,255,0.25)"/>
    <text x="344" y="0" text-anchor="middle" fill="#5fb7ff">llm · 10</text>

    <rect x="416" y="-22" width="120" height="32" rx="16" fill="rgba(244,184,96,0.08)" stroke="rgba(244,184,96,0.25)"/>
    <text x="476" y="0" text-anchor="middle" fill="#f4b860">mcp · 10</text>
  </g>

  <!-- URL footer -->
  <text x="1128" y="588" text-anchor="end" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" fill="#5F6573">oraclebot.net/probes</text>
</svg>
