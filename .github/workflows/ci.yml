name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck-platform:
    name: Typecheck (platform)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: platform/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit

  typecheck-worker:
    name: Typecheck (worker)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit

  docker-build-worker:
    name: Build worker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build worker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          file: ./worker/Dockerfile
          push: false
          tags: oraclebot-worker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cli-smoke:
    name: CLI smoke (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # The CLI has zero runtime deps, so npm install is a no-op for runtime.
      # We still run it to materialise package.json's bin field for `npx`-style
      # invocations.
      - name: Install
        run: npm install --no-audit --no-fund
      - name: --help works
        run: node bin/oraclebot.mjs --help
      - name: --version works
        run: node bin/oraclebot.mjs --version
      - name: Missing-token error path returns non-zero
        run: |
          set +e
          ORACLEBOT_TOKEN= node bin/oraclebot.mjs whoami
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "expected non-zero exit when no token is configured"
            exit 1
          fi
          echo "ok: exit code $rc"
